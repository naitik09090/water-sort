<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Tube color layers -->
    <linearGradient id="col1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ff4d6d"/>
    </linearGradient>
    <linearGradient id="col2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="col3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0ff57"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="col4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <!-- Glass tube gradient -->
    <linearGradient id="tubeGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.10)"/>
    </linearGradient>
    <!-- Drop gradient -->
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#80c8ff"/>
      <stop offset="55%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#b0ff57"/>
    </linearGradient>
    <!-- Background dark circle -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#050d1e"/>
    </radialGradient>
    <!-- Drop filter glow -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tubeGlow" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path for tube interior -->
    <clipPath id="tubeClip">
      <rect x="20" y="12" width="24" height="36" rx="5" ry="5"/>
    </clipPath>
  </defs>

  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- ── TEST TUBE ── -->
  <!-- Tube body outline (glass border) -->
  <rect x="20" y="12" width="24" height="38" rx="6" ry="6"
        fill="rgba(255,255,255,0.05)"
        stroke="rgba(255,255,255,0.28)"
        stroke-width="1.5"
        filter="url(#tubeGlow)"/>

  <!-- Color layers inside tube (bottom to top) -->
  <!-- Layer 1: Cyan (bottom) -->
  <rect x="21.5" y="38" width="21" height="10" rx="0 0 5 5" clip-path="url(#tubeClip)" fill="url(#col4)"/>
  <!-- Layer 2: Green -->
  <rect x="21.5" y="29" width="21" height="9" clip-path="url(#tubeClip)" fill="url(#col3)"/>
  <!-- Layer 3: Yellow/Orange -->
  <rect x="21.5" y="20" width="21" height="9" clip-path="url(#tubeClip)" fill="url(#col2)"/>
  <!-- Layer 4: Pink (top) -->
  <rect x="21.5" y="12" width="21" height="8" clip-path="url(#tubeClip)" fill="url(#col1)"/>

  <!-- Glass sheen over colors -->
  <rect x="21.5" y="12" width="6" height="38" rx="3"
        clip-path="url(#tubeClip)"
        fill="rgba(255,255,255,0.10)"/>

  <!-- Tube top cap bar -->
  <rect x="19" y="9" width="26" height="5" rx="2.5"
        fill="rgba(255,255,255,0.20)"
        stroke="rgba(255,255,255,0.35)"
        stroke-width="1"/>

  <!-- ── WATER DROPLET (top right, dripping) ── -->
  <g filter="url(#glow)" opacity="0.95">
    <path d="M50 16 C50 16 44 23 44 27 C44 30.3 46.7 33 50 33 C53.3 33 56 30.3 56 27 C56 23 50 16 50 16Z"
          fill="url(#dropGrad)"/>
    <!-- Drop sheen -->
    <ellipse cx="47.5" cy="23" rx="2" ry="3.5"
             fill="rgba(255,255,255,0.35)"
             transform="rotate(-20,47.5,23)"/>
  </g>

  <!-- Tiny sparkle dots -->
  <circle cx="10" cy="14" r="1.2" fill="#00f5ff" opacity="0.55"/>
  <circle cx="8"  cy="28" r="0.8" fill="#b0ff57" opacity="0.45"/>
  <circle cx="57" cy="46" r="1"   fill="#ff6b9d" opacity="0.5"/>
  <circle cx="12" cy="50" r="0.9" fill="#ffcc44" opacity="0.4"/>
</svg>
